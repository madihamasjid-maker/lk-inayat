<!DOCTYPE html>
<html>
<head>
  <title>LK Inayat Order</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 350px;
      margin: auto;
    }

    button {
      padding: 12px;
      margin: 10px 0;
      width: 100%;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    .google {
      background: white;
      border: 1px solid #ccc;
    }

    .order {
      background: green;
      color: white;
    }

    input {
      padding: 10px;
      width: 100%;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🍗 Order Now</h2>

  <button class="google" onclick="login()">
    🔐 Login with Google
  </button>

  <input type="text" id="name" placeholder="Your Name">
  <input type="text" id="item" placeholder="Item (Chicken Biryani)">
  <input type="text" id="address" placeholder="Delivery Address">

  <button class="order" onclick="orderNow()">📲 Order on WhatsApp</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDcBhqYsOuicf8ne4EafbX03CeBVOscpZ0",
  authDomain: "lk-inayat.firebaseapp.com",
  projectId: "lk-inayat",
  storageBucket: "lk-inayat.firebasestorage.app",
  messagingSenderId: "281466728696",
  appId: "1:281466728696:web:56df3ddf85a65e3d840b0d",
  measurementId: "G-B8H5X91K53"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.login = function() {
  signInWithPopup(auth, provider)
    .then((result) => {
      document.getElementById("name").value = result.user.displayName;
      alert("Login Successful ✅");
    })
    .catch((error) => {
      alert(error.message);
    });
}

window.orderNow = function() {
  let name = document.getElementById("name").value;
  let item = document.getElementById("item").value;
  let address = document.getElementById("address").value;

  let message = `🛒 Order Details:
👤 Name: ${name}
🍗 Item: ${item}
📍 Address: ${address}`;

  let phone = "919279747519"; // ✅ YOUR NUMBER SET

  let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
}
</script>

</body>
</html>
